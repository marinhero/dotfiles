# Starship prompt — Nord-themed, paired with the rest of the rig
# https://starship.rs/config/

format = """
$directory$git_branch$git_status$git_state$cmd_duration
$character """

add_newline = false

[character]
success_symbol = "[›](bold green)"
error_symbol = "[›](bold red)"
vimcmd_symbol = "[‹](bold cyan)"

[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = true
read_only = " "

[git_branch]
symbol = " "
style = "bold purple"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold yellow"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇡${ahead_count}⇣${behind_count}"
modified = "✱${count}"
staged = "[++\\($count\\)](green)"
untracked = "?${count}"
stashed = "≡"
deleted = "✘${count}"

[git_state]
style = "bold red"

[cmd_duration]
min_time = 2_000
format = "[ $duration]($style) "
style = "bold yellow"

[nodejs]
symbol = " "
style = "bold green"

[python]
symbol = " "
style = "bold yellow"

[rust]
symbol = " "
style = "bold red"

[golang]
symbol = " "
style = "bold cyan"

[deno]
symbol = " "
style = "bold cyan"

[package]
disabled = true

[time]
disabled = true

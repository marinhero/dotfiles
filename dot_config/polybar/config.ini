; -----------------------------------------------------------
; Polybar configuration — Nord theme for bspwm
; -----------------------------------------------------------

[colors]
background     = #2e3440
background-alt = #3b4252
foreground     = #eceff4
foreground-alt = #d8dee9
primary        = #88c0d0
alert          = #bf616a
warning        = #ebcb8b
success        = #a3be8c
sep            = #4c566a

; -----------------------------------------------------------
; Bar
; -----------------------------------------------------------

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 28
offset-x = 0
offset-y = 0
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2

border-bottom-size = 2
border-bottom-color = ${colors.primary}

padding-left = 1
padding-right = 2

module-margin-left = 0
module-margin-right = 0

separator = %{F#4c566a}  │  %{F-}

font-0 = Iosevka Nerd Font Mono:size=11;3
font-1 = Iosevka Nerd Font Mono:size=14;4

wm-restack = bspwm
override-redirect = false
enable-ipc = true

tray-position = right
tray-detached = false
tray-padding = 4
tray-background = ${colors.background}

modules-left = bspwm sep xwindow
modules-center = date
modules-right = pulseaudio backlight battery wlan cpu temperature memory

cursor-click = pointer
cursor-scroll = ns-resize

; -----------------------------------------------------------
; Modules — left
; -----------------------------------------------------------

[module/bspwm]
type = internal/bspwm

pin-workspaces = true

label-focused = %name%
label-focused-background = ${colors.background-alt}
label-focused-underline = ${colors.primary}
label-focused-padding = 2

label-occupied = %name%
label-occupied-foreground = ${colors.foreground-alt}
label-occupied-padding = 2

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

label-empty = %name%
label-empty-foreground = #4c566a
label-empty-padding = 2

[module/sep]
type = custom/text
content = %{F#4c566a}│%{F-}
content-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:40:...%
label-foreground = ${colors.foreground-alt}

; -----------------------------------------------------------
; Modules — center
; -----------------------------------------------------------

[module/date]
type = internal/date
interval = 30

date = %a %b %d
time = %H:%M

label = %{T2}󰃰%{T-} %date%  %time%
label-foreground = ${colors.foreground}

; -----------------------------------------------------------
; Modules — right
; -----------------------------------------------------------

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
label-volume-foreground = ${colors.foreground}

label-muted = %{T2}󰝟%{T-} muted
label-muted-foreground = #4c566a

ramp-volume-0 = %{T2}󰕿%{T-}
ramp-volume-1 = %{T2}󰖀%{T-}
ramp-volume-2 = %{T2}󰕾%{T-}

click-right = pavucontrol &

[module/backlight]
type = internal/backlight
card = intel_backlight

format = <ramp> <label>
label = %percentage%%

ramp-0 = %{T2}󰃞%{T-}
ramp-1 = %{T2}󰃟%{T-}
ramp-2 = %{T2}󰃠%{T-}

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98

format-charging = <animation-charging> <label-charging>
label-charging = %percentage%%

format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %percentage%%

format-full = %{T2}󰁹%{T-} <label-full>
label-full = full
label-full-foreground = ${colors.success}

ramp-capacity-0 = %{T2}󰂎%{T-}
ramp-capacity-0-foreground = ${colors.alert}
ramp-capacity-1 = %{T2}󰁻%{T-}
ramp-capacity-1-foreground = ${colors.warning}
ramp-capacity-2 = %{T2}󰁾%{T-}
ramp-capacity-3 = %{T2}󰂀%{T-}
ramp-capacity-4 = %{T2}󰁹%{T-}

animation-charging-0 = %{T2}󰢜%{T-}
animation-charging-1 = %{T2}󰂆%{T-}
animation-charging-2 = %{T2}󰂈%{T-}
animation-charging-3 = %{T2}󰂉%{T-}
animation-charging-4 = %{T2}󰂋%{T-}
animation-charging-framerate = 750

[module/wlan]
type = internal/network
interface-type = wireless
interval = 5

format-connected = %{T2}󰤨%{T-} <label-connected>
label-connected = %essid%
label-connected-foreground = ${colors.foreground}

format-disconnected = %{T2}󰤭%{T-}
label-disconnected-foreground = #4c566a

[module/cpu]
type = internal/cpu
interval = 3

format = %{T2}󰻠%{T-} <label>
label = %percentage:2%%

click-left = alacritty -e btop &

[module/temperature]
type = internal/temperature
interval = 3
thermal-zone = 5
warn-temperature = 80

format = %{T2}󰔏%{T-} <label>
label = %temperature-c%

format-warn = %{T2}󰸁%{T-} <label-warn>
label-warn = %temperature-c%
label-warn-foreground = ${colors.alert}

[module/memory]
type = internal/memory
interval = 5

format = %{T2}󰍛%{T-} <label>
label = %percentage_used:2%%

click-left = alacritty -e btop &

; -----------------------------------------------------------
; Global WM settings
; -----------------------------------------------------------

[settings]
screenchange-reload = true

[global/wm]
margin-top = 0
margin-bottom = 0
